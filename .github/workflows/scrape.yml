name: 🎬 Daily Movie Scraper

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Number of pages to scrape'
        required: false
        default: '2'
      skip_email:
        description: 'Skip sending email?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper and send email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          PAGES=${{ github.event.inputs.pages || '2' }}
          SKIP_EMAIL=${{ github.event.inputs.skip_email || 'false' }}
          if [ "$SKIP_EMAIL" = "true" ]; then
            python main.py --pages $PAGES --no-email
          else
            python main.py --pages $PAGES
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies.json
          if git diff --cached --quiet; then
            echo "No new data — nothing to commit."
          else
            git commit -m "🎬 Daily update: $(date +'%Y-%m-%d')"
            git push
          fi
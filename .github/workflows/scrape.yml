name: 🎬 Daily Movie Scraper

on:
  schedule:
    - cron: '18 10 * * *'   # 6:18 PM Nairobi time (UTC+3)
  workflow_dispatch:
    inputs:
      skip_email:
        description: 'Skip sending email?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and send email
        env:
          SCRAPERAPI_KEY:     ${{ secrets.SCRAPERAPI_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: |
          SKIP_EMAIL=${{ github.event.inputs.skip_email || 'false' }}
          if [ "$SKIP_EMAIL" = "true" ]; then
            python main.py --no-email
          else
            python main.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data — nothing to commit."
          else
            git commit -m "🎬 Daily update: $(date +'%Y-%m-%d')"
            git push
          fi
